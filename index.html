<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пойдем гулять?</title>
    <!-- Подключаем Tailwind CSS для чистого современного стиля -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Обеспечиваем плавное изменение размеров кнопок */
        #btn-yes, #btn-no {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans antialiased">

    <!-- Карточка с вопросом -->
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-md border border-slate-200 max-w-md w-full text-center">
        
        <!-- Окно вопроса -->
        <div id="question-block" class="space-y-8">
            <h1 class="text-2xl md:text-3xl font-semibold text-slate-800 tracking-tight">
                Пойдем гулять?
            </h1>
            
            <!-- Контейнер кнопок с достаточным пространством под увеличение -->
            <div class="flex items-center justify-center gap-6 min-h-[180px] overflow-visible">
                
                <!-- Кнопка ДА -->
                <button id="btn-yes" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-8 py-3 rounded-lg shadow-sm active:scale-95 focus:outline-none">
                    Да
                </button>

                <!-- Кнопка НЕТ -->
                <button id="btn-no" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium px-6 py-3 rounded-lg active:scale-95 focus:outline-none">
                    Нет
                </button>

            </div>
        </div>

        <!-- Окно успешного ответа (изначально скрыто) -->
        <div id="success-block" class="hidden space-y-4 py-6">
            <h2 class="text-2xl font-bold text-slate-800 leading-normal">
                еееее ура
            </h2>
        </div>

    </div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const questionBlock = document.getElementById('question-block');
        const successBlock = document.getElementById('success-block');

        let yesScale = 1;
        let noScale = 1;

        // При нажатии на "Нет"
        btnNo.addEventListener('click', () => {
            // Увеличиваем "Да"
            yesScale += 0.35;
            btnYes.style.transform = `scale(${yesScale})`;

            // Уменьшаем "Нет" (но не даем ей исчезнуть полностью)
            noScale = Math.max(0.3, noScale - 0.15);
            btnNo.style.transform = `scale(${noScale})`;
        });

        // При нажатии на "Да"
        btnYes.addEventListener('click', () => {
            questionBlock.classList.add('hidden');
            successBlock.classList.remove('hidden');
        });
    </script>
</body>
</html>
